## 优先级处理

```yaml
priority:
  # 紧急任务 - 立即处理
  high:
    timeout: 60  # 秒
    interrupt: true
    notify: true
    
  # 普通任务 - 排队处理
  normal:
    timeout: 300  # 秒
    interrupt: false
    notify: false
    
  # 低优任务 - 空闲时处理
  low:
    timeout: 3600  # 秒
    interrupt: false
    notify: false
```

---

## 消息处理流程

```
1. 接收消息
   ↓
2. 身份验证
   ↓
3. 解析内容
   ↓
4. 匹配路由规则
   ↓
5. 选择智能体
   ↓
6. 加载上下文 (SOUL + USER + MEMORY)
   ↓
7. 调用 LLM
   ↓
8. 执行动作 (技能/命令)
   ↓
9. 格式化响应
   ↓
10. 返回结果
```

---

## 安全配置

```yaml
security:
  # 沙箱配置
  sandbox:
    enabled: true
    allowed_paths:
      - workspace/
      - skills/
      - memory/
    
  # 命令黑名单
  blocked_commands:
    - "rm -rf /*"
    - "sudo *"
    - "curl * | bash"
    - "wget * | bash"
    
  # 网络访问
  network:
    enabled: false  # 默认禁用
    whitelist: []
    
  # 速率限制
  rate_limit:
    requests_per_minute: 60
    burst: 10
```

---

## 日志配置

```yaml
logging:
  level: info
  file: logs/gateway.log
  format: "[%(asctime)s] %(levelname)s - %(message)s"
  
  # 审计日志
  audit:
    enabled: true
    file: logs/audit.log
    include:
      - message_received
      - route_matched
      - agent_invoked
      - action_executed
```

