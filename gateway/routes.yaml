---
# OpenTalon 网关路由配置
# 定义消息如何路由到不同的智能体
---

## 网关信息

**版本**: 0.1.0

**模式**: 单智能体 (默认)

---

## 路由规则

### 默认路由

```yaml
default:
  agent: Talon
  workspace: workspace/
  fallback: true
```

### 智能路由

```yaml
routes:
  # 代码开发相关 → DevBot
  - name: development
    patterns:
      - ".*写代码.*"
      - ".*debug.*"
      - ".*bug.*"
      - ".*重构.*"
      - ".*测试.*"
      - ".*代码.*"
    agent: DevBot
    priority: high
    
  # 数据分析相关 → DataBot
  - name: data-analysis
    patterns:
      - ".*分析.*"
      - ".*数据.*"
      - ".*统计.*"
      - ".*图表.*"
      - ".*可视化.*"
    agent: DataBot
    priority: normal
    
  # 运维部署相关 → OpsBot
  - name: operations
    patterns:
      - ".*部署.*"
      - ".*运维.*"
      - ".*服务器.*"
      - ".*配置.*"
      - ".*安装.*"
    agent: OpsBot
    priority: high
    
  # 文档写作相关 → DocBot
  - name: documentation
    patterns:
      - ".*写文档.*"
      - ".*翻译.*"
      - ".*润色.*"
      - ".*报告.*"
    agent: DocBot
    priority: normal
    
  # 安全检查相关 → SecBot
  - name: security
    patterns:
      - ".*安全.*"
      - ".*审计.*"
      - ".*漏洞.*"
      - ".*权限.*"
    agent: SecBot
    priority: high
```

