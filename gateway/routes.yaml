## 智能体定义

```yaml
agents:
  Talon:
    type: general
    description: 通用智能体 - 默认处理器
    workspace: workspace/
    config:
      soul: workspace/SOUL.md
      user: workspace/USER.md
      memory: workspace/MEMORY.md
    permissions:
      - read_files
      - write_files
      - execute_safe
    status: active
    
  DevBot:
    type: specialist
    description: 开发专家 - 代码相关任务
    workspace: workspace/
    config:
      soul: workspace/SOUL.md
      specialty: development
    permissions:
      - read_files
      - write_files
      - execute_code
    status: standby
    
  OpsBot:
    type: specialist
    description: 运维专家 - 部署和配置
    workspace: workspace/
    config:
      soul: workspace/SOUL.md
      specialty: operations
    permissions:
      - read_files
      - write_files
      - execute_commands
    status: standby
    
  DataBot:
    type: specialist
    description: 数据专家 - 分析和可视化
    workspace: workspace/
    config:
      soul: workspace/SOUL.md
      specialty: data
    permissions:
      - read_files
      - write_files
      - execute_analysis
    status: standby
    
  DocBot:
    type: specialist
    description: 文档专家 - 写作和翻译
    workspace: workspace/
    config:
      soul: workspace/SOUL.md
      specialty: documentation
    permissions:
      - read_files
      - write_files
    status: standby
    
  SecBot:
    type: specialist
    description: 安全专家 - 审计和检查
    workspace: workspace/
    config:
      soul: workspace/SOUL.md
      specialty: security
    permissions:
      - read_files
      - scan_files
      - security_check
    status: standby
```

